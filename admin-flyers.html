<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Generador de Flyers - Baby All Boys</title>
  <link rel="icon" href="/icons/icon-192.png">
  <style>
    :root{
      --bg:#070707;
      --panel:#141414;
      --panel2:#202020;
      --line:rgba(255,255,255,.16);
      --text:#f7f7f7;
      --muted:#bdbdbd;
      --white:#fff;
      --black:#050505;
    }
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at top,rgba(255,255,255,.1),transparent 34%),linear-gradient(135deg,#050505,#151515 52%,#050505);color:var(--text);font-family:Arial,Helvetica,sans-serif;min-height:100vh;padding:14px}
    button,input,select,textarea{font:inherit}
    button{border:0;cursor:pointer}
    .shell{width:min(1280px,100%);margin:0 auto;display:grid;gap:14px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0}
    .topbar h1{margin:0;font:1000 24px/1 Arial Black,Impact,Arial,sans-serif;letter-spacing:.2px}
    .topbar span{color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.8px}
    .layout{display:grid;gap:14px}
    .panel,.preview-wrap{border:1px solid var(--line);border-radius:18px;background:linear-gradient(145deg,rgba(18,18,18,.98),rgba(31,31,31,.94));box-shadow:0 18px 42px rgba(0,0,0,.42)}
    .panel{padding:14px}
    .panel h2{margin:0 0 12px;font:1000 18px/1 Arial Black,Impact,Arial,sans-serif}
    .form-grid{display:grid;gap:10px}
    label{display:grid;gap:6px;color:var(--muted);font-size:11px;font-weight:1000;text-transform:uppercase;letter-spacing:.7px}
    input,select,textarea{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:12px;background:rgba(255,255,255,.07);color:#fff;padding:11px 12px;outline:0}
    input:focus,select:focus,textarea:focus{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.08)}
    select option{color:#111;background:#fff}
    textarea{min-height:72px;resize:vertical;text-transform:none}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .file-row{display:grid;grid-template-columns:1fr 56px;gap:10px;align-items:end}
    .mini-preview{width:56px;height:56px;border-radius:14px;border:1px solid rgba(255,255,255,.18);background:#090909 center/cover no-repeat;display:grid;place-items:center;color:#ddd;font-weight:1000}
    .actions,.preset-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .actions{margin-top:12px}
    .btn{min-height:44px;border-radius:13px;font-weight:1000}
    .btn-primary{background:#fff;color:#080808}
    .btn-secondary{background:#2b2b2b;color:#fff;border:1px solid rgba(255,255,255,.16)}
    .btn-small{min-height:34px;border-radius:10px;padding:0 10px;background:rgba(255,255,255,.09);color:#fff;border:1px solid rgba(255,255,255,.14);font-size:12px;font-weight:1000}
    .category-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:14px 0 9px}
    .category-head h3{margin:0;font-size:15px}
    .category-list{display:grid;gap:8px}
    .cat-row{display:grid;grid-template-columns:minmax(0,1fr) 112px 34px 34px 34px;gap:7px;align-items:center}
    .cat-row input{padding:9px 10px;border-radius:10px}
    .icon-btn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.14);font-weight:1000}
    .preview-wrap{padding:12px;position:sticky;top:12px;align-self:start}
    .canvas-frame{width:100%;background:#050505;border-radius:14px;padding:8px;overflow:hidden}
    canvas{display:block;width:100%;height:auto;border-radius:8px;background:#111}
    .status{min-height:20px;margin-top:9px;color:#d8d8d8;font-size:12px;font-weight:900}
    .fineprint{color:#aaa;font-size:11px;line-height:1.35;margin-top:8px}
    @media(min-width:980px){.layout{grid-template-columns:430px minmax(0,1fr)}.shell{padding-bottom:24px}.topbar h1{font-size:30px}}
    @media(max-width:620px){body{padding:10px}.topbar{display:grid}.cols,.actions,.preset-actions{grid-template-columns:1fr}.cat-row{grid-template-columns:1fr 92px 32px 32px 32px;gap:5px}.cat-row input{font-size:13px}.panel,.preview-wrap{border-radius:15px;padding:11px}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <span>Herramienta interna</span>
        <h1>Generador de Flyers</h1>
      </div>
      <span>Baby All Boys</span>
    </header>

    <main class="layout">
      <section class="panel" aria-label="Datos del flyer">
        <h2>Datos del próximo partido</h2>
        <div class="form-grid">
          <div class="cols">
            <label>Tipo de flyer
              <select id="flyerType">
                <option>Próximo partido</option>
              </select>
            </label>
            <label>Zona/equipo
              <select id="zona">
                <option value="all-boys-a-zona-c">All Boys A - Zona C</option>
                <option value="all-boys-b-zona-i">All Boys B - Zona I</option>
                <option value="los-albos-mat1">Los Albos - MAT1</option>
                <option value="all-boys-mat4">All Boys - MAT4</option>
              </select>
            </label>
          </div>
          <div class="cols">
            <label>Condición
              <select id="condicion">
                <option>Local</option>
                <option>Visitante</option>
              </select>
            </label>
            <label>Torneo
              <input id="torneo" value="TORNEO ANUAL ’26">
            </label>
          </div>
          <div class="cols">
            <label>Equipo local
              <input id="local" value="ALL BOYS">
            </label>
            <label>Equipo visitante
              <input id="visitante" value="RIVAL">
            </label>
          </div>
          <div class="cols">
            <label>Fecha
              <input id="fecha" value="SÁBADO 2 DE MAYO">
            </label>
            <label>Valor entrada
              <input id="entrada" value="VALOR DE LA ENTRADA $ 7000.-">
            </label>
          </div>
          <label>Dirección
            <input id="direccion" value="Chivilcoy 1998, Floresta - CABA.">
          </label>
          <div class="file-row">
            <label>Foto superior
              <input id="fotoFile" type="file" accept="image/*">
            </label>
            <span class="mini-preview" id="fotoPreview">Foto</span>
          </div>
          <div class="cols">
            <div class="file-row">
              <label>Escudo local
                <input id="localFile" type="file" accept="image/*">
              </label>
              <span class="mini-preview" id="localPreview">L</span>
            </div>
            <div class="file-row">
              <label>Escudo visitante
                <input id="visitanteFile" type="file" accept="image/*">
              </label>
              <span class="mini-preview" id="visitantePreview">V</span>
            </div>
          </div>
        </div>

        <div class="category-head">
          <h3>Categorías y horarios</h3>
          <button class="btn-small" type="button" id="addRow">Agregar fila</button>
        </div>
        <div class="preset-actions">
          <button class="btn-small" type="button" id="presetCI">Preset C/I</button>
          <button class="btn-small" type="button" id="presetMAT">Preset MAT</button>
        </div>
        <div class="category-list" id="categoryList" aria-label="Lista de categorías"></div>

        <div class="actions">
          <button class="btn btn-primary" type="button" id="downloadBtn">Descargar PNG</button>
          <button class="btn btn-secondary" type="button" id="copyBtn">Copiar texto WhatsApp</button>
          <button class="btn btn-secondary" type="button" id="sampleBtn">Cargar datos de prueba</button>
          <button class="btn btn-secondary" type="button" id="clearBtn">Limpiar</button>
        </div>
        <div class="status" id="status" aria-live="polite"></div>
        <p class="fineprint">No guarda datos ni modifica resultados. Todo se genera localmente en este navegador.</p>
      </section>

      <section class="preview-wrap" aria-label="Vista previa">
        <div class="canvas-frame">
          <canvas id="flyerCanvas" width="1080" height="1350"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script>
    const canvas = document.getElementById('flyerCanvas');
    const ctx = canvas.getContext('2d');
    const fields = {
      zona: document.getElementById('zona'),
      condicion: document.getElementById('condicion'),
      local: document.getElementById('local'),
      visitante: document.getElementById('visitante'),
      torneo: document.getElementById('torneo'),
      fecha: document.getElementById('fecha'),
      entrada: document.getElementById('entrada'),
      direccion: document.getElementById('direccion')
    };
    const statusEl = document.getElementById('status');
    const categoryList = document.getElementById('categoryList');
    const state = { topImage: null, localShield: null, visitorShield: null };
    const presets = {
      ci: [['CAT 2019','14:15 HS'],['CAT 2013','15:00 HS'],['CAT 2018','15:40 HS'],['CAT 2014','16:30 HS'],['CAT 2017','17:20 HS'],['CAT 2016','18:10 HS'],['CAT 2015','19:00 HS']],
      mat: [['CAT 2013','8:30 HS'],['CAT 2014/15','9:15 HS'],['CAT 2016/17','10:00 HS'],['CAT 2018/19','10:45 HS'],['CAT 2020/21','11:15 HS']]
    };

    function setStatus(text){statusEl.textContent = text || ''}
    function val(id){return fields[id].value.trim()}
    function zonaLabel(){return fields.zona.options[fields.zona.selectedIndex].text}
    function normName(text){return String(text||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/g,'').toLowerCase() || 'flyer'}

    function loadImage(src){
      return new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    function readFile(input, key, previewId){
      const file = input.files && input.files[0];
      if(!file){state[key]=null;document.getElementById(previewId).style.backgroundImage='';render();return}
      const reader = new FileReader();
      reader.onload = async () => {
        state[key] = await loadImage(reader.result);
        const preview = document.getElementById(previewId);
        preview.textContent = '';
        preview.style.backgroundImage = `url("${reader.result}")`;
        render();
      };
      reader.readAsDataURL(file);
    }

    function drawCover(img,x,y,w,h){
      if(!img)return;
      const scale = Math.max(w/img.width,h/img.height);
      const sw = w/scale, sh = h/scale;
      const sx = (img.width-sw)/2, sy = (img.height-sh)/2;
      ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
    }

    function roundedRect(x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r);
      ctx.arcTo(x,y,x+w,y,r);
      ctx.closePath();
    }

    function drawTexture(){
      ctx.fillStyle = '#111';
      ctx.fillRect(0,0,1080,1350);
      ctx.save();
      ctx.globalAlpha = .16;
      for(let i=0;i<900;i++){
        const x=(i*73)%1080, y=(i*137)%1350, s=1+((i*11)%8);
        ctx.fillStyle = i%3 ? '#fff' : '#000';
        ctx.fillRect(x,y,s,s);
      }
      ctx.globalAlpha = .18;
      for(let i=0;i<34;i++){
        ctx.strokeStyle = i%2 ? '#fff' : '#000';
        ctx.lineWidth = 5 + (i%9);
        ctx.beginPath();
        ctx.moveTo(-20, (i*41)%1350);
        ctx.lineTo(1100, ((i*41)+160)%1350);
        ctx.stroke();
      }
      ctx.restore();
      ctx.strokeStyle = '#f4f4f4';
      ctx.lineWidth = 26;
      ctx.strokeRect(19,19,1042,1312);
      ctx.strokeStyle = '#111';
      ctx.lineWidth = 10;
      ctx.strokeRect(44,44,992,1262);
    }

    function drawShield(img,x,y,label){
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,.5)';
      ctx.shadowBlur = 24;
      ctx.shadowOffsetY = 10;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x,y,112,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.beginPath();
      ctx.arc(x,y,98,0,Math.PI*2);
      ctx.clip();
      if(img){
        ctx.fillStyle = '#fff';
        ctx.fillRect(x-98,y-98,196,196);
        drawCover(img,x-88,y-88,176,176);
      }else{
        ctx.fillStyle = '#101010';
        ctx.fillRect(x-98,y-98,196,196);
        ctx.fillStyle = '#fff';
        ctx.font = '900 54px Arial Black, Impact, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(label.slice(0,2).toUpperCase(),x,y);
      }
      ctx.restore();
    }

    function drawTextFit(text,x,y,maxWidth,fontSize,fontFamily='Arial Black, Impact, sans-serif',minSize=30){
      let size = fontSize;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      do{
        ctx.font = `1000 ${size}px ${fontFamily}`;
        if(ctx.measureText(text).width <= maxWidth || size <= minSize) break;
        size -= 3;
      }while(size>minSize);
      ctx.fillText(text,x,y);
      return size;
    }

    function categories(){
      return [...categoryList.querySelectorAll('.cat-row')].map(row => ({
        cat: row.querySelector('[data-cat]').value.trim(),
        time: row.querySelector('[data-time]').value.trim()
      })).filter(item => item.cat || item.time);
    }

    function render(){
      drawTexture();
      const topH = 365;
      if(state.topImage) drawCover(state.topImage,70,70,940,topH);
      else {
        ctx.fillStyle = '#1b1b1b';
        ctx.fillRect(70,70,940,topH);
        ctx.fillStyle = '#fff';
        ctx.font = '1000 84px Arial Black, Impact, sans-serif';
        ctx.textAlign='center';
        ctx.fillText('BABY FÚTBOL',540,245);
      }
      ctx.fillStyle='rgba(0,0,0,.34)';
      ctx.fillRect(70,70,940,topH);
      ctx.strokeStyle='#fff';
      ctx.lineWidth=8;
      ctx.strokeRect(70,70,940,topH);

      ctx.fillStyle='#fff';
      ctx.font='1000 38px Arial Black, Impact, sans-serif';
      ctx.textAlign='center';
      ctx.fillText('BABY FÚTBOL',540,118);
      drawTextFit('PRÓXIMO PARTIDO',540,235,880,104);
      ctx.font='1000 42px Arial Black, Impact, sans-serif';
      ctx.fillText(val('torneo') || 'TORNEO ANUAL ’26',540,315);

      drawShield(state.localShield,392,492,(val('local')||'L').replace(/[^A-Z0-9]/gi,''));
      drawShield(state.visitorShield,688,492,(val('visitante')||'V').replace(/[^A-Z0-9]/gi,''));
      ctx.fillStyle='#fff';
      ctx.font='1000 48px Arial Black, Impact, sans-serif';
      ctx.fillText('VS',540,505);

      ctx.save();
      ctx.shadowColor='rgba(0,0,0,.55)';
      ctx.shadowBlur=25;
      ctx.shadowOffsetY=12;
      roundedRect(80,620,920,650,28);
      ctx.fillStyle='#eeeeee';
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle='#111';
      ctx.lineWidth=7;
      roundedRect(80,620,920,650,28);
      ctx.stroke();

      ctx.fillStyle='#0a0a0a';
      drawTextFit(val('fecha') || 'SÁBADO 2 DE MAYO',540,700,820,66);
      ctx.font='1000 34px Arial Black, Impact, sans-serif';
      ctx.fillText(`${val('local') || 'LOCAL'}  vs  ${val('visitante') || 'VISITANTE'}`,540,768);
      ctx.font='900 24px Arial, sans-serif';
      ctx.fillText(`${zonaLabel()} · ${val('condicion')}`,540,808);

      const items = categories();
      const startY = 870;
      const rowH = items.length > 6 ? 46 : 54;
      ctx.textAlign='left';
      items.forEach((item,i)=>{
        const col = i % 2;
        const row = Math.floor(i/2);
        const x = col ? 560 : 155;
        const y = startY + row*rowH;
        ctx.fillStyle = '#111';
        ctx.font = '1000 30px Arial Black, Impact, sans-serif';
        ctx.fillText(item.cat || 'CAT',x,y);
        ctx.font = '900 28px Arial, sans-serif';
        ctx.fillText(item.time || '00:00 HS',x+190,y);
      });

      ctx.textAlign='center';
      ctx.fillStyle='#0a0a0a';
      ctx.font='1000 38px Arial Black, Impact, sans-serif';
      ctx.fillText(val('entrada') || 'VALOR DE LA ENTRADA $ 7000.-',540,1137);
      ctx.font='900 30px Arial, sans-serif';
      wrapCenter(val('direccion') || 'Chivilcoy 1998, Floresta - CABA.',540,1202,800,34);
    }

    function wrapCenter(text,x,y,maxWidth,lineHeight){
      const words = String(text).split(/\s+/);
      let line = '';
      const lines = [];
      ctx.textAlign = 'center';
      words.forEach(word => {
        const test = line ? `${line} ${word}` : word;
        if(ctx.measureText(test).width > maxWidth && line){lines.push(line); line = word}
        else line = test;
      });
      if(line) lines.push(line);
      lines.slice(0,2).forEach((l,i)=>ctx.fillText(l,x,y+i*lineHeight));
    }

    function addRow(cat='',time=''){
      const row = document.createElement('div');
      row.className = 'cat-row';
      row.innerHTML = `<input data-cat aria-label="Categoría" value="${cat}"><input data-time aria-label="Horario" value="${time}"><button class="icon-btn" type="button" data-up>↑</button><button class="icon-btn" type="button" data-down>↓</button><button class="icon-btn" type="button" data-del>×</button>`;
      categoryList.appendChild(row);
      row.addEventListener('input',render);
      row.querySelector('[data-del]').addEventListener('click',()=>{row.remove();render()});
      row.querySelector('[data-up]').addEventListener('click',()=>{if(row.previousElementSibling)categoryList.insertBefore(row,row.previousElementSibling);render()});
      row.querySelector('[data-down]').addEventListener('click',()=>{if(row.nextElementSibling)categoryList.insertBefore(row.nextElementSibling,row);render()});
      render();
    }

    function setRows(rows){categoryList.innerHTML='';rows.forEach(([cat,time])=>addRow(cat,time));render()}
    function setPreset(kind){setRows(presets[kind])}
    function loadSample(){
      fields.zona.value='all-boys-a-zona-c';
      fields.condicion.value='Local';
      fields.local.value='ALL BOYS A';
      fields.visitante.value='PUEYRREDON';
      fields.torneo.value='TORNEO ANUAL ’26';
      fields.fecha.value='SÁBADO 2 DE MAYO';
      fields.entrada.value='VALOR DE LA ENTRADA $ 7000.-';
      fields.direccion.value='Chivilcoy 1998, Floresta - CABA.';
      setPreset('ci');
      render();
    }

    async function downloadPng(){
      render();
      const filename = `baby-allboys-proximo-partido-${normName(zonaLabel())}-${normName(val('fecha'))}.png`;
      canvas.toBlob(blob => {
        if(!blob){setStatus('No se pudo generar el PNG.');return}
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
        setStatus('PNG generado.');
      }, 'image/png');
    }

    async function copyWhatsApp(){
      const lines = [
        '⚽ Baby Fútbol All Boys',
        `Próximo partido - ${val('torneo') || 'Torneo Anual ’26'}`,
        `Fecha: ${val('fecha')}`,
        `${val('local')} vs ${val('visitante')}`,
        'Categorías y horarios:',
        ...categories().map(item => `${item.cat} - ${item.time}`),
        `Entrada: ${val('entrada')}`,
        `Dirección: ${val('direccion')}`
      ];
      const text = lines.join('\n');
      try{
        await navigator.clipboard.writeText(text);
        setStatus('Texto copiado para WhatsApp.');
      }catch(e){
        const tmp = document.createElement('textarea');
        tmp.value = text;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        tmp.remove();
        setStatus('Texto copiado para WhatsApp.');
      }
    }

    function clearForm(){
      Object.values(fields).forEach(el=>{if(el.tagName==='SELECT')el.selectedIndex=0;else el.value=''});
      fields.torneo.value='TORNEO ANUAL ’26';
      fields.entrada.value='VALOR DE LA ENTRADA $ 7000.-';
      state.localShield=null;state.visitorShield=null;state.topImage=null;
      ['localPreview','visitantePreview','fotoPreview'].forEach(id=>{const el=document.getElementById(id);el.style.backgroundImage='';el.textContent=id==='fotoPreview'?'Foto':id==='localPreview'?'L':'V'});
      setPreset('ci');
      setStatus('');
    }

    Object.values(fields).forEach(el=>el.addEventListener('input',render));
    document.getElementById('addRow').addEventListener('click',()=>addRow('CAT','00:00 HS'));
    document.getElementById('presetCI').addEventListener('click',()=>setPreset('ci'));
    document.getElementById('presetMAT').addEventListener('click',()=>setPreset('mat'));
    document.getElementById('sampleBtn').addEventListener('click',loadSample);
    document.getElementById('clearBtn').addEventListener('click',clearForm);
    document.getElementById('downloadBtn').addEventListener('click',downloadPng);
    document.getElementById('copyBtn').addEventListener('click',copyWhatsApp);
    document.getElementById('fotoFile').addEventListener('change',e=>readFile(e.target,'topImage','fotoPreview'));
    document.getElementById('localFile').addEventListener('change',e=>readFile(e.target,'localShield','localPreview'));
    document.getElementById('visitanteFile').addEventListener('change',e=>readFile(e.target,'visitorShield','visitantePreview'));

    loadImage('fondo.png').then(img=>{state.topImage=img;document.getElementById('fotoPreview').style.backgroundImage='url("fondo.png")';render()});
    setPreset('ci');
  </script>
</body>
</html>
