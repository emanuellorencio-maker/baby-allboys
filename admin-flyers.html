<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Generador de Citaciones - Baby All Boys</title>
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#070707;--panel:#151515;--line:rgba(255,255,255,.16);--text:#f7f7f7;--muted:#bdbdbd}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#080808;color:var(--text);font-family:Arial,Helvetica,sans-serif;padding:12px}
    button,input,select,textarea{font:inherit}
    button{border:0;cursor:pointer}
    .shell{width:min(1280px,100%);margin:auto;display:grid;gap:14px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0}
    .topbar h1{margin:0;font:1000 25px/1 Arial Black,Impact,Arial,sans-serif}
    .topbar span{display:block;color:var(--muted);font-size:11px;font-weight:1000;text-transform:uppercase;letter-spacing:.8px}
    .layout{display:grid;gap:14px}
    .panel,.preview-wrap{border:1px solid var(--line);border-radius:18px;background:#171717;box-shadow:0 18px 42px rgba(0,0,0,.42)}
    .panel{padding:14px}
    .panel h2{margin:0 0 12px;font:1000 18px/1 Arial Black,Impact,Arial,sans-serif}
    .form-grid{display:grid;gap:10px}
    label{display:grid;gap:6px;color:var(--muted);font-size:11px;font-weight:1000;text-transform:uppercase;letter-spacing:.7px}
    input,select,textarea{width:100%;border:1px solid rgba(255,255,255,.16);border-radius:12px;background:rgba(255,255,255,.07);color:#fff;padding:11px 12px;outline:0}
    input:focus,select:focus,textarea:focus{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.08)}
    select option{color:#111;background:#fff}
    textarea{min-height:70px;resize:vertical;text-transform:none}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .file-row{display:grid;grid-template-columns:1fr 56px;gap:10px;align-items:end}
    .mini-preview{width:56px;height:56px;border-radius:14px;border:1px solid rgba(255,255,255,.18);background:#090909 center/cover no-repeat;display:grid;place-items:center;color:#ddd;font-weight:1000}
    .actions,.preset-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .actions{margin-top:12px}
    .btn{min-height:44px;border-radius:13px;font-weight:1000}
    .btn-primary{background:#fff;color:#080808}
    .btn-secondary{background:#2b2b2b;color:#fff;border:1px solid rgba(255,255,255,.16)}
    .btn-small{min-height:34px;border-radius:10px;padding:0 10px;background:rgba(255,255,255,.09);color:#fff;border:1px solid rgba(255,255,255,.14);font-size:12px;font-weight:1000}
    .category-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:14px 0 9px}
    .category-head h3{margin:0;font-size:15px}
    .category-list{display:grid;gap:8px}
    .cat-row{display:grid;grid-template-columns:minmax(0,1fr) 96px 96px 32px 32px 32px;gap:6px;align-items:center}
    .cat-row input{padding:9px 9px;border-radius:10px;font-size:13px}
    .icon-btn{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.14);font-weight:1000}
    .toggle-row{display:flex;align-items:center;gap:9px;padding:10px;border:1px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.04);color:#ddd;font-size:12px;font-weight:900}
    .toggle-row input{width:auto}
    .preview-wrap{padding:12px;position:sticky;top:12px;align-self:start}
    .preview-frame{width:100%;background:#050505;border-radius:14px;padding:8px;overflow:auto}
    .flyer-viewport{width:min(100%,540px);aspect-ratio:1080/1350;margin:auto;overflow:hidden;border-radius:8px;background:#050505}
    #flyer-canvas{position:relative;width:1080px;height:1350px;overflow:hidden;transform-origin:top left}
    #flyer-base{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
    .layer{position:absolute;z-index:2;pointer-events:none}
    #layer-escudos{position:absolute;top:530px;left:50%;transform:translateX(-50%);z-index:2;display:flex;gap:0;pointer-events:none}
    #layer-textos{position:absolute;inset:0;z-index:3;pointer-events:none}
    .flyer-text{position:absolute;margin:0;color:#000;font-family:"Bebas Neue","Oswald","Arial Narrow",Impact,sans-serif;text-align:center;text-transform:uppercase;white-space:nowrap}
    .text-fecha{top:900px;left:50%;transform:translateX(-50%);width:900px;font-size:46px;font-weight:900;letter-spacing:1px;line-height:1;color:#000}
    .schedule-line{position:absolute;left:330px;width:475px;height:41px;color:#000;font-family:"Bebas Neue","Oswald","Arial Narrow",Impact,sans-serif;font-size:32px;line-height:41px;letter-spacing:1px;text-transform:uppercase}
    .schedule-line .cat{position:absolute;left:0;top:0;width:230px;font-weight:500;text-align:left}
    .schedule-line .time{position:absolute;left:255px;top:0;width:220px;font-weight:900;text-align:left}
    .text-entry{top:1235px;left:50%;transform:translateX(-50%);width:900px;font-size:34px;font-weight:900;line-height:1;letter-spacing:.5px;color:#000;text-align:center}
    .text-address{top:1290px;left:50%;transform:translateX(-50%);width:900px;color:#000;font-family:"Bebas Neue","Oswald","Arial Narrow",Impact,sans-serif;font-weight:400;font-size:25px;line-height:1;text-align:center;text-transform:none;white-space:normal}
    #flyer-canvas.flyer-compact .schedule-line{font-size:31px;line-height:38px;height:38px}
    #flyer-canvas.flyer-compact .text-entry{top:1238px}
    #flyer-canvas.flyer-compact .text-address{top:1288px}
    #flyer-canvas.flyer-roomy .schedule-line{font-size:36px;line-height:48px;height:48px}
    #flyer-canvas.flyer-roomy .text-entry{top:1215px}
    #flyer-canvas.flyer-roomy .text-address{top:1275px}
    .shield{width:140px;height:140px;border-radius:0;display:grid;place-items:center;z-index:2;overflow:hidden;padding:10px}
    .shield.local-bg{background:#fff}
    .shield.rival-bg{background:#050505}
    .shield img{width:100%;height:100%;object-fit:contain}
    .status{min-height:20px;margin-top:9px;color:#d8d8d8;font-size:12px;font-weight:900}
    .fineprint{color:#aaa;font-size:11px;line-height:1.35;margin-top:8px}
    @media(min-width:1020px){.layout{grid-template-columns:460px minmax(0,1fr)}.topbar h1{font-size:31px}}
    @media(max-width:680px){body{padding:10px}.topbar{display:grid}.cols,.actions,.preset-actions{grid-template-columns:1fr}.cat-row{grid-template-columns:1fr 82px 82px 30px 30px 30px;gap:5px}.cat-row input{font-size:12px;padding:8px 7px}.panel,.preview-wrap{border-radius:15px;padding:11px}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <span>Herramienta interna</span>
        <h1>Generador de Citaciones</h1>
      </div>
      <span>Baby All Boys</span>
    </header>

    <main class="layout">
      <section class="panel" aria-label="Datos del flyer">
        <h2>Datos del próximo partido</h2>
        <div class="form-grid">
          <div class="cols">
            <label>Tipo de flyer
              <select id="flyerType"><option>Próximo partido</option></select>
            </label>
            <label>Zona/equipo
              <select id="zona">
                <option value="c">All Boys A - Zona C</option>
                <option value="i">All Boys B - Zona I</option>
                <option value="mat1">Los Albos - MAT1</option>
                <option value="mat4">All Boys - MAT4</option>
              </select>
            </label>
          </div>
          <div class="cols">
            <label>Fecha fixture
              <select id="fechaFixture"><option value="">Cargando fixture...</option></select>
            </label>
            <label>Condición
              <select id="condicion"><option>Local</option><option>Visitante</option></select>
            </label>
          </div>
          <button class="btn btn-primary" type="button" id="quickMode">MODO RÁPIDO</button>
          <div class="cols">
            <label>Equipo local
              <input id="local" value="ALL BOYS">
            </label>
            <label>Equipo visitante
              <input id="visitante" value="RIVAL">
            </label>
          </div>
          <div class="cols">
            <label>Fecha editable
              <input id="fecha" value="SÁBADO 2 DE MAYO">
            </label>
            <label>Torneo
              <input id="torneo" value="TORNEO ANUAL '26">
            </label>
          </div>
          <label>Dirección
            <select id="direccionPreset">
              <option value="">Elegir sugerencia...</option>
              <option value="Chivilcoy 1998, Floresta - CABA">Chivilcoy 1998, Floresta - CABA</option>
              <option value="Chivilcoy 1949 (Predio descubierto), Floresta - CABA">Chivilcoy 1949 (Predio descubierto), Floresta - CABA</option>
            </select>
            <input id="direccion" value="Chivilcoy 1998, Floresta - CABA">
          </label>
          <div class="cols">
            <label>Valor entrada
              <input id="entrada" value="VALOR DE LA ENTRADA $ 7000.-">
            </label>
            <label class="toggle-row"><input id="mostrarEntrada" type="checkbox" checked> Mostrar entrada</label>
          </div>
          <div class="cols">
            <div class="file-row">
              <label>Escudo local
                <input id="localFile" type="file" accept="image/*">
              </label>
              <span class="mini-preview" id="localPreview">L</span>
            </div>
            <div class="file-row">
              <label>Escudo visitante
                <input id="visitanteFile" type="file" accept="image/*">
              </label>
              <span class="mini-preview" id="visitantePreview">V</span>
            </div>
          </div>
        </div>

        <div class="category-head">
          <h3>Categorías, partido y citación</h3>
          <button class="btn-small" type="button" id="addRow">Agregar fila</button>
        </div>
        <div class="preset-actions">
          <button class="btn-small" type="button" id="presetCI">Preset C/I</button>
          <button class="btn-small" type="button" id="presetMAT">Preset MAT</button>
        </div>
        <div class="category-list" id="categoryList" aria-label="Lista de categorías"></div>

        <div class="actions">
          <button class="btn btn-primary" type="button" id="downloadBtn">Descargar PNG</button>
          <button class="btn btn-secondary" type="button" id="copyBtn">Copiar texto WhatsApp</button>
          <button class="btn btn-secondary" type="button" id="sampleBtn">Cargar datos de prueba</button>
          <button class="btn btn-secondary" type="button" id="clearBtn">Limpiar</button>
        </div>
        <div class="status" id="status" aria-live="polite"></div>
        <p class="fineprint">No guarda datos ni modifica producción. Todo se genera localmente en este navegador.</p>
      </section>

      <section class="preview-wrap" aria-label="Vista previa">
        <div class="preview-frame">
          <div class="flyer-viewport" id="flyerViewport">
            <div id="flyer-canvas">
              <img id="flyer-base" src="/assets/flyers/citacion-base.png" alt="">
              <div id="layer-textos" class="layer"></div>
              <div id="layer-escudos" class="layer"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
  <script>
    const flyerCanvas = document.getElementById('flyer-canvas');
    const flyerViewport = document.getElementById('flyerViewport');
    const flyerBase = document.getElementById('flyer-base');
    const layerTextos = document.getElementById('layer-textos');
    const layerEscudos = document.getElementById('layer-escudos');
    const fields = {
      zona: document.getElementById('zona'),
      fechaFixture: document.getElementById('fechaFixture'),
      condicion: document.getElementById('condicion'),
      local: document.getElementById('local'),
      visitante: document.getElementById('visitante'),
      fecha: document.getElementById('fecha'),
      torneo: document.getElementById('torneo'),
      direccion: document.getElementById('direccion'),
      entrada: document.getElementById('entrada'),
      mostrarEntrada: document.getElementById('mostrarEntrada')
    };
    const statusEl = document.getElementById('status');
    const categoryList = document.getElementById('categoryList');
    const ZONAS = {
      c:{equipo:'ALL BOYS "A"',label:'All Boys A - Zona C',cats:['2019','2013','2018','2014','2017','2016','2015']},
      i:{equipo:'ALL BOYS "B"',label:'All Boys B - Zona I',cats:['2019','2013','2018','2014','2017','2016','2015']},
      mat1:{equipo:'LOS ALBOS',label:'Los Albos - MAT1',cats:['2013','2014/15','2016/17','2018/19','2020/21/22']},
      mat4:{equipo:'ALL BOYS',label:'All Boys - MAT4',cats:['2013','2014','2015','2016','2017','2018/19/20']}
    };
    const DEFAULT_TIMES = {
      c:['14:15','15:00','15:40','16:30','17:20','18:10','19:00'],
      i:['14:15','15:00','15:40','16:30','17:20','18:10','19:00'],
      mat1:['8:30','9:15','10:00','10:45','11:15'],
      mat4:['8:30','9:15','10:00','10:45','11:15','12:00']
    };
    const DIRECCIONES = {
      local:['Chivilcoy 1998, Floresta - CABA','Chivilcoy 1949 (Predio descubierto), Floresta - CABA']
    };
    const state = { allBoysShield:null, localShield:null, visitorShield:null, fixtures:{}, currentFixture:null };

    function setStatus(text){statusEl.textContent = text || ''}
    function val(id){const el=fields[id];return el.type==='checkbox'?el.checked:el.value.trim()}
    function norm(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/["']/g,'').replace(/\s+/g,' ').trim().toUpperCase()}
    function isOwn(name,z=fields.zona.value){return norm(name)===norm(ZONAS[z].equipo)||norm(name).includes(norm(ZONAS[z].equipo))}
    function rivalFromFixture(f,z=fields.zona.value){if(!f)return '';return isOwn(f.local,z)?f.visitante:f.local}
    function normName(text){return String(text||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/g,'').toLowerCase() || 'flyer'}

    function loadImage(src){
      return new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }
    function readFile(input,key,previewId){
      const file = input.files && input.files[0];
      if(!file){state[key]=null;document.getElementById(previewId).style.backgroundImage='';render();return}
      const reader = new FileReader();
      reader.onload = async () => {
        state[key] = reader.result;
        const preview = document.getElementById(previewId);
        preview.textContent = '';
        preview.style.backgroundImage = `url("${reader.result}")`;
        render();
      };
      reader.readAsDataURL(file);
    }
    function imageSrc(img){return typeof img === 'string' ? img : (img && img.src) || ''}
    function textNode(className,text){
      const el=document.createElement('div');
      el.className=`flyer-text ${className}`;
      el.textContent=text;
      return el;
    }
    function shieldNode(isAllBoys,img){
      const src=imageSrc(img);
      const shield=document.createElement('div');
      shield.className=`shield ${isAllBoys?'local-bg':'rival-bg'}`;
      if(src){
        const image=document.createElement('img');
        image.src=src;
        image.alt='';
        shield.appendChild(image);
      }
      return shield;
    }
    function categories(){
      return [...categoryList.querySelectorAll('.cat-row')].map(row=>({
        cat:row.querySelector('[data-cat]').value.trim(),
        match:row.querySelector('[data-match]').value.trim(),
        call:row.querySelector('[data-call]').value.trim()
      })).filter(item=>item.cat||item.match||item.call);
    }
    function parseTime(text){
      const m=String(text||'').match(/(\d{1,2})[:.](\d{2})/);
      if(!m)return null;
      const h=Number(m[1]),min=Number(m[2]);
      if(h>23||min>59)return null;
      return h*60+min;
    }
    function formatTime(total){
      const t=(total+1440)%1440;
      const h=Math.floor(t/60),m=t%60;
      return `${h}:${String(m).padStart(2,'0')}`;
    }
    function calcCall(match){const t=parseTime(match);return t==null?'':formatTime(t-30);}
    function formatDisplayTime(text){return text ? `${text} HS` : '';}

    async function loadFixtures(z=fields.zona.value){
      if(state.fixtures[z])return state.fixtures[z];
      try{
        const data = await fetch(`data/${z}/fixture.json?ts=${Date.now()}`,{cache:'no-store'}).then(r=>r.ok?r.json():[]);
        state.fixtures[z] = Array.isArray(data)?data:[];
      }catch(e){state.fixtures[z]=[]}
      return state.fixtures[z];
    }
    async function fillFixtureSelect(){
      const fixtures = await loadFixtures();
      fields.fechaFixture.innerHTML = '';
      if(!fixtures.length){
        fields.fechaFixture.innerHTML = '<option value="">Sin fixture cargado</option>';
        state.currentFixture = null;
        render();
        return;
      }
      fixtures.forEach(f=>{
        const opt=document.createElement('option');
        opt.value=f.fecha_id||f.fecha||'';
        opt.textContent=`${f.fecha_id||''} · ${f.fecha||''}`.replace(/^ · /,'');
        fields.fechaFixture.appendChild(opt);
      });
      applyFixture(false);
    }
    function selectedFixture(){
      const list=state.fixtures[fields.zona.value]||[];
      return list.find(f=>(f.fecha_id||f.fecha)===fields.fechaFixture.value)||list[0]||null;
    }
    function fechaHumana(fecha){
      const m=String(fecha||'').match(/(\d{1,2})\s+de\s+([a-záéíóúñ]+)/i);
      if(!m)return String(fecha||'').replace(/^Fecha\s+\d+\s*-\s*/i,'').toUpperCase();
      const meses={enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,setiembre:8,octubre:9,noviembre:10,diciembre:11};
      const mes=meses[m[2].toLowerCase()];
      const dia=Number(m[1]);
      const d=new Date(2026,mes ?? 0,dia,12);
      const dias=['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'];
      return `${dias[d.getDay()]} ${dia} DE ${m[2].toUpperCase()}`;
    }
    function updateDireccionOptions(f){
      const preset=document.getElementById('direccionPreset');
      preset.innerHTML='<option value="">Elegir sugerencia...</option>';
      const opts = fields.condicion.value==='Local' ? DIRECCIONES.local : [f?.direccion,f?.sede,f?.cancha,f?.domicilio].filter(Boolean);
      opts.forEach(dir=>{const o=document.createElement('option');o.value=dir;o.textContent=dir;preset.appendChild(o);});
    }
    function applyFixture(fillAll=true){
      const f=selectedFixture();
      state.currentFixture=f;
      if(!f){render();return}
      fields.condicion.value = f.condicion || (isOwn(f.local)?'Local':'Visitante');
      fields.local.value = f.local || '';
      fields.visitante.value = f.visitante || '';
      fields.fecha.value = fechaHumana(f.fecha);
      updateDireccionOptions(f);
      if(fields.condicion.value==='Local')fields.direccion.value = DIRECCIONES.local[0];
      else fields.direccion.value = [f.direccion,f.sede,f.cancha,f.domicilio].filter(Boolean)[0] || '';
      if(fillAll)setRowsForZone();
      render();
    }
    function setRowsForZone(){
      const z=fields.zona.value;
      const rows=ZONAS[z].cats.map((cat,i)=>{
        const match=DEFAULT_TIMES[z][i]||'';
        return [`CAT ${cat}`,match,calcCall(match)];
      });
      setRows(rows);
    }
    function addRow(cat='',match='',call=''){
      const row=document.createElement('div');
      row.className='cat-row';
      row.innerHTML=`<input data-cat aria-label="Categoría" value="${cat}"><input data-match aria-label="Horario partido" value="${match}"><input data-call aria-label="Horario citación" value="${call}"><button class="icon-btn" type="button" data-up>↑</button><button class="icon-btn" type="button" data-down>↓</button><button class="icon-btn" type="button" data-del>×</button>`;
      categoryList.appendChild(row);
      const matchInput=row.querySelector('[data-match]');
      const callInput=row.querySelector('[data-call]');
      row.addEventListener('input',e=>{if(e.target===matchInput&&!callInput.dataset.manual){callInput.value=calcCall(matchInput.value)};render();});
      callInput.addEventListener('input',()=>{callInput.dataset.manual='1'});
      row.querySelector('[data-del]').addEventListener('click',()=>{row.remove();render()});
      row.querySelector('[data-up]').addEventListener('click',()=>{if(row.previousElementSibling)categoryList.insertBefore(row,row.previousElementSibling);render()});
      row.querySelector('[data-down]').addEventListener('click',()=>{if(row.nextElementSibling)categoryList.insertBefore(row.nextElementSibling,row);render()});
      render();
    }
    function setRows(rows){categoryList.innerHTML='';rows.forEach(r=>addRow(r[0],r[1],r[2]));render();}

    function resizePreview(){
      const w=flyerViewport.clientWidth || 540;
      flyerCanvas.style.transform=`scale(${w/1080})`;
    }
    function updateShieldInputs(){
      const localOwn=isOwn(val('local')), visitorOwn=isOwn(val('visitante'));
      const localInput=document.getElementById('localFile');
      const visitorInput=document.getElementById('visitanteFile');
      const localPreview=document.getElementById('localPreview');
      const visitorPreview=document.getElementById('visitantePreview');
      localInput.disabled=localOwn;
      visitorInput.disabled=visitorOwn;
      if(localOwn){state.localShield=null;localInput.value='';localPreview.style.backgroundImage='';localPreview.textContent='AB'}
      if(visitorOwn){state.visitorShield=null;visitorInput.value='';visitorPreview.style.backgroundImage='';visitorPreview.textContent='AB'}
      if(!localOwn && !localPreview.style.backgroundImage)localPreview.textContent='L';
      if(!visitorOwn && !visitorPreview.style.backgroundImage)visitorPreview.textContent='V';
    }
    function render(){
      layerTextos.innerHTML='';
      layerEscudos.innerHTML='';
      const localOwn=isOwn(val('local')), visitorOwn=isOwn(val('visitante'));
      const items=categories().slice(0,7);
      const isCompact=items.length>=7;
      const isRoomy=items.length<=5;
      flyerCanvas.classList.toggle('flyer-compact',isCompact);
      flyerCanvas.classList.toggle('flyer-roomy',isRoomy);
      updateShieldInputs();
      const localImg=state.localShield || (localOwn ? state.allBoysShield : null);
      const visitorImg=state.visitorShield || (visitorOwn ? state.allBoysShield : null);
      const localShield=shieldNode(localOwn,localImg);
      const visitorShield=shieldNode(visitorOwn,visitorImg);
      layerEscudos.appendChild(localShield);
      layerEscudos.appendChild(visitorShield);
      layerTextos.appendChild(textNode('text-fecha',val('fecha')||'SÁBADO 2 DE MAYO'));
      const rowGap=isCompact?38:(isRoomy?48:41);
      items.forEach((item,i)=>{
        const line=document.createElement('div');
        line.className='schedule-line';
        line.style.top=`${975+i*rowGap}px`;
        const cat=document.createElement('span');
        cat.className='cat';
        cat.textContent=item.cat||'CAT';
        const time=document.createElement('span');
        time.className='time';
        time.textContent=formatDisplayTime(item.call||calcCall(item.match));
        line.append(cat,time);
        layerTextos.appendChild(line);
      });
      if(val('mostrarEntrada')){
        layerTextos.appendChild(textNode('text-entry',val('entrada')||'VALOR DE LA ENTRADA $ 7000.-'));
      }
      const address=textNode('text-address',val('direccion')||'Dirección a confirmar');
      layerTextos.appendChild(address);
      resizePreview();
    }
    function waitForBaseImage(){
      return new Promise(resolve=>{
        if(flyerBase.complete && flyerBase.naturalWidth)resolve();
        else{flyerBase.onload=()=>resolve();flyerBase.onerror=()=>resolve();}
      });
    }
    async function downloadPng(){
      render();
      await waitForBaseImage();
      if(document.fonts && document.fonts.ready)await document.fonts.ready;
      if(!window.html2canvas){setStatus('No se pudo cargar el generador PNG. Probá recargar la página.');return}
      const filename=`baby-allboys-citacion-${normName(ZONAS[fields.zona.value].label)}-${normName(val('fecha'))}.png`;
      const previousTransform=flyerCanvas.style.transform;
      flyerCanvas.style.transform='none';
      try{
        const rendered=await html2canvas(flyerCanvas,{backgroundColor:null,width:1080,height:1350,scale:1,useCORS:true});
        rendered.toBlob(blob=>{if(!blob){setStatus('No se pudo generar el PNG.');return}const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);setStatus('PNG generado.');},'image/png');
      }catch(e){
        setStatus('No se pudo generar el PNG.');
      }finally{
        flyerCanvas.style.transform=previousTransform;
      }
    }
    async function copyWhatsApp(){
      const f=state.currentFixture, rival=rivalFromFixture(f)|| (isOwn(val('local'))?val('visitante'):val('local'));
      const lines=['⚽ Baby Fútbol All Boys','Próximo partido',val('fecha'),'',
        `All Boys vs ${rival}`,'','Categorías y citación:',...categories().map(i=>`${i.cat} - ${formatDisplayTime(i.call||calcCall(i.match))}`),'',
        `📍 ${val('direccion') || 'Dirección a confirmar'}`];
      if(val('mostrarEntrada'))lines.push(`🎟 ${val('entrada')}`);
      const text=lines.join('\n');
      try{await navigator.clipboard.writeText(text);setStatus('Texto copiado para WhatsApp.')}catch(e){const tmp=document.createElement('textarea');tmp.value=text;document.body.appendChild(tmp);tmp.select();document.execCommand('copy');tmp.remove();setStatus('Texto copiado para WhatsApp.')}
    }
    function loadSample(){fields.zona.value='c';fillFixtureSelect().then(()=>{fields.fechaFixture.value='F3';applyFixture(true);});}
    function clearForm(){
      fields.zona.value='c';fields.condicion.value='Local';fields.local.value='ALL BOYS';fields.visitante.value='RIVAL';fields.fecha.value='SÁBADO 2 DE MAYO';fields.torneo.value="TORNEO ANUAL '26";fields.direccion.value='Chivilcoy 1998, Floresta - CABA';fields.entrada.value='VALOR DE LA ENTRADA $ 7000.-';fields.mostrarEntrada.checked=true;state.localShield=null;state.visitorShield=null;['localPreview','visitantePreview'].forEach((id,i)=>{const el=document.getElementById(id);el.style.backgroundImage='';el.textContent=i?'V':'L'});setRowsForZone();render();
    }

    Object.values(fields).forEach(el=>el.addEventListener('input',render));
    fields.zona.addEventListener('change',()=>{state.currentFixture=null;fillFixtureSelect();setRowsForZone();});
    fields.fechaFixture.addEventListener('change',()=>applyFixture(false));
    fields.condicion.addEventListener('change',()=>updateDireccionOptions(state.currentFixture));
    document.getElementById('direccionPreset').addEventListener('change',e=>{if(e.target.value)fields.direccion.value=e.target.value;render();});
    document.getElementById('quickMode').addEventListener('click',()=>applyFixture(true));
    document.getElementById('addRow').addEventListener('click',()=>addRow('CAT','00:00',''));
    document.getElementById('presetCI').addEventListener('click',()=>setRows(ZONAS.c.cats.map((c,i)=>[`CAT ${c}`,DEFAULT_TIMES.c[i],calcCall(DEFAULT_TIMES.c[i])])));
    document.getElementById('presetMAT').addEventListener('click',()=>setRows(ZONAS.mat1.cats.map((c,i)=>[`CAT ${c}`,DEFAULT_TIMES.mat1[i],calcCall(DEFAULT_TIMES.mat1[i])])));
    document.getElementById('sampleBtn').addEventListener('click',loadSample);
    document.getElementById('clearBtn').addEventListener('click',clearForm);
    document.getElementById('downloadBtn').addEventListener('click',downloadPng);
    document.getElementById('copyBtn').addEventListener('click',copyWhatsApp);
    document.getElementById('localFile').addEventListener('change',e=>readFile(e.target,'localShield','localPreview'));
    document.getElementById('visitanteFile').addEventListener('change',e=>readFile(e.target,'visitorShield','visitantePreview'));

    window.addEventListener('resize',resizePreview);
    Promise.all([waitForBaseImage(),loadImage('/assets/flyers/allboys.png')]).then(([,shield])=>{
      state.allBoysShield=shield;setRowsForZone();fillFixtureSelect();render();
    });
  </script>
</body>
</html>
